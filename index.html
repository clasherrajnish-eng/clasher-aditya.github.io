<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCjH65Bh_lCFNBiZOb7zM",
        authDomain: "clasher-aditya.firebaseapp.com",
        projectId: "clasher-aditya",
        storageBucket: "clasher-aditya.firebaseapp.com",
        messagingSenderId: "65255990006",
        appId: "1:65255990006:web:bfd57a16f6d3348e4ad01b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // 1. Force Login function
    window.signInWithGoogle = function() {
        signInWithPopup(auth, provider).then(() => {
            alert("Login successful! You can now continue.");
            location.reload(); 
        }).catch((error) => {
            console.error("Login failed", error);
        });
    }

    // 2. Layout Tracker (The "10-copy" limit)
    window.copyBase = function(link) {
        let count = parseInt(localStorage.getItem('copyCount') || "0");

        if (count >= 10) {
            // Trigger the Login Gate
            document.getElementById('login-gate').style.display = 'flex';
        } else {
            count++;
            localStorage.setItem('copyCount', count);
            alert("Base copied! (" + count + "/10 used)");
            window.open(link, '_blank');
        }
    }

    // 3. Keep user logged in
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-gate').style.display = 'none';
        }
    });
</script>
