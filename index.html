<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clasher Aditya | Premium Layout Engine</title>
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; text-align: center; }
        #login-gate { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: flex; justify-content: center; 
            align-items: center; z-index: 1000; 
        }
        .gate-box { border: 2px solid #00f2ff; padding: 40px; border-radius: 20px; }
        button { padding: 15px 30px; cursor: pointer; background: #00f2ff; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-gate">
        <div class="gate-box">
            <h1>CLASHER ADITYA</h1>
            <p>Please sign in to unlock exclusive layouts.</p>
            <button onclick="signInWithGoogle()">Sign in with Google</button>
        </div>
    </div>

    <h1>CLASHER ADITYA</h1>
    <div onclick="copyBase('LINK_HERE_1')"><button>Copy War Base</button></div>
    <div onclick="copyBase('LINK_HERE_2')"><button>Copy Trophy Base</button></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCjH65Bh_lCFNBiZOb7zM",
            authDomain: "clasher-aditya.firebaseapp.com",
            projectId: "clasher-aditya",
            storageBucket: "clasher-aditya.firebaseapp.com",
            messagingSenderId: "65255990006",
            appId: "1:65255990006:web:bfd57a16f6d3348e4ad01b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Login Logic
        window.signInWithGoogle = () => {
            signInWithPopup(auth, provider).then(() => {
                document.getElementById('login-gate').style.display = 'none';
            });
        };

        // Copy Engine (10 limit)
        window.copyBase = (link) => {
            let count = parseInt(localStorage.getItem('copyCount') || "0");
            if (count >= 10) {
                alert("You've reached your free limit! Please sign in.");
                document.getElementById('login-gate').style.display = 'flex';
            } else {
                count++;
                localStorage.setItem('copyCount', count);
                window.open(link, '_blank');
            }
        };

        // Check if already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-gate').style.display = 'none';
            }
        });
    </script>
</body>
</html>
